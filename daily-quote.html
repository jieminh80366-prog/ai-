<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="每日一句">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>每日一句</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --card: #16213e;
      --accent-pos: #f5c842;
      --accent-neg: #e05c7a;
      --text-main: #f0ece4;
      --text-sub: #9a96b0;
      --border: rgba(255,255,255,0.07);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* Background atmosphere */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(245,200,66,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(224,92,122,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
    }

    /* Header */
    header {
      text-align: center;
      padding: 52px 20px 28px;
      position: relative;
      z-index: 1;
    }
    .date-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--text-sub);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--text-main);
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-pos);
      margin: 0 6px;
      vertical-align: middle;
      position: relative;
      top: -2px;
    }

    /* Today's quote card */
    .today-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px 28px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .today-card::before {
      content: '"';
      font-family: 'Noto Serif TC', serif;
      font-size: 120px;
      line-height: 1;
      color: rgba(245,200,66,0.06);
      position: absolute;
      top: -10px;
      left: 12px;
      pointer-events: none;
    }
    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      letter-spacing: 0.12em;
      font-weight: 400;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .card-tag.pos { background: rgba(245,200,66,0.12); color: var(--accent-pos); }
    .card-tag.neg { background: rgba(224,92,122,0.12); color: var(--accent-neg); }
    .card-tag::before { content: '●'; font-size: 8px; }

    .today-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--text-sub);
      margin-bottom: 6px;
      font-weight: 300;
    }
    .quote-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.7;
      color: var(--text-main);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .quote-author {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 300;
      letter-spacing: 0.05em;
    }
    .quote-author::before { content: '— '; }

    /* Random draw card */
    .draw-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 16px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: opacity 0.3s;
    }
    .draw-card.empty {
      align-items: center;
      justify-content: center;
    }
    .draw-card.empty .draw-hint {
      color: var(--text-sub);
      font-size: 13px;
      letter-spacing: 0.05em;
    }
    .draw-quote-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.7;
      color: var(--text-main);
    }
    .draw-quote-author {
      font-size: 12px;
      color: var(--text-sub);
    }
    .draw-quote-author::before { content: '— '; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 15px 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      background: var(--accent-pos);
      color: #1a1500;
    }
    .btn-primary:active { transform: scale(0.97); background: #e0b530; }

    .btn-secondary {
      background: var(--card);
      color: var(--text-main);
      border: 1px solid var(--border);
    }
    .btn-secondary:active { transform: scale(0.97); }

    /* Section title */
    .section-title {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--text-sub);
      font-weight: 300;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Add form */
    .add-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-sub);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-main);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-group textarea { resize: none; height: 80px; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: rgba(245,200,66,0.4);
    }
    .form-group select option { background: var(--surface); }

    /* Custom list */
    .quote-list { display: flex; flex-direction: column; gap: 10px; }
    .quote-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 16px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .quote-item-body { flex: 1; }
    .quote-item-text {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .quote-item-author {
      font-size: 11px;
      color: var(--text-sub);
    }
    .quote-item-author::before { content: '— '; }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 18px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.5;
      transition: opacity 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { opacity: 1; color: var(--accent-neg); }

    .empty-state {
      text-align: center;
      color: var(--text-sub);
      font-size: 13px;
      padding: 24px 0;
      letter-spacing: 0.05em;
    }

    /* Toggle section */
    .toggle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 12px;
    }
    .toggle-icon {
      color: var(--text-sub);
      font-size: 18px;
      transition: transform 0.2s;
    }
    .toggle-icon.open { transform: rotate(180deg); }
    .collapsible { overflow: hidden; transition: max-height 0.35s ease; }
    .collapsible.closed { max-height: 0 !important; }

    .save-notice {
      text-align: center;
      font-size: 11px;
      color: var(--text-sub);
      letter-spacing: 0.1em;
      margin-top: 32px;
      padding-bottom: 12px;
    }

    /* Flip animation for draw card */
    @keyframes flipIn {
      0% { opacity: 0; transform: rotateX(-15deg) translateY(-10px); }
      100% { opacity: 1; transform: rotateX(0) translateY(0); }
    }
    .flip-anim { animation: flipIn 0.35s ease; }
  </style>
</head>
<body>

<header>
  <div class="date-label" id="dateLabel"></div>
  <h1>每<span class="dot"></span>日<span class="dot"></span>一<span class="dot"></span>句</h1>
</header>

<div class="container">

  <!-- Today's quote -->
  <div class="today-card" id="todayCard">
    <div class="today-label">TODAY'S QUOTE</div>
    <div class="card-tag" id="todayTag">正能量</div>
    <div class="quote-text" id="todayText"></div>
    <div class="quote-author" id="todayAuthor"></div>
  </div>

  <!-- Random draw -->
  <div class="draw-card empty" id="drawCard">
    <div class="draw-hint">點擊「再抽一句」探索更多語錄</div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="drawRandom()">✦ 再抽一句</button>
    <button class="btn btn-secondary" onclick="toggleAddForm()">＋ 新增語錄</button>
  </div>

  <!-- Add form (collapsible) -->
  <div id="addFormWrap" class="collapsible closed" style="max-height:0">
    <div class="add-form">
      <div class="form-group">
        <label>語錄內容</label>
        <textarea id="inputText" placeholder="輸入你想記住的句子…"></textarea>
      </div>
      <div class="form-group">
        <label>出處 / 作者（選填）</label>
        <input id="inputAuthor" type="text" placeholder="例：蘇格拉底、電影《你好，李煥英》">
      </div>
      <div class="form-group">
        <label>類型</label>
        <select id="inputType">
          <option value="pos">☀ 正能量</option>
          <option value="neg">🌑 負能量</option>
        </select>
      </div>
      <div class="btn-row" style="margin-bottom:0">
        <button class="btn btn-primary" onclick="addQuote()">儲存語錄</button>
        <button class="btn btn-secondary" onclick="toggleAddForm()">取消</button>
      </div>
    </div>
  </div>

  <!-- Custom quotes list -->
  <div id="customSection">
    <div class="toggle-header" onclick="toggleList()">
      <div class="section-title" style="margin-bottom:0;flex:1">我的語錄庫 <span id="customCount"></span></div>
      <span class="toggle-icon" id="toggleIcon">▾</span>
    </div>
    <div class="collapsible" id="listWrap" style="max-height:2000px">
      <div class="quote-list" id="quoteList"></div>
      <div class="empty-state" id="emptyState">還沒有自訂語錄，快來新增一句吧 ✦</div>
    </div>
  </div>

  <div class="save-notice">語錄自動儲存於本機 · 可加入主畫面當 App 使用</div>
</div>

<script>
// ── 內建語錄 ──────────────────────────────────────────
const BUILT_IN = [
  { text: "你今天的努力，是明天的底氣。", author: "佚名", type: "pos" },
  { text: "成功不是終點，失敗也不是末日，繼續前行的勇氣才是最重要的。", author: "邱吉爾", type: "pos" },
  { text: "每一個清晨都是一次重新開始的機會。", author: "佚名", type: "pos" },
  { text: "你所走的每一步，都算數。", author: "村上春樹", type: "pos" },
  { text: "比昨天更好一點點，就已足夠。", author: "佚名", type: "pos" },
  { text: "夢想不會逃跑，逃跑的永遠是自己。", author: "佚名", type: "pos" },
  { text: "善良是一種力量，溫柔是一種勇敢。", author: "佚名", type: "pos" },
  { text: "人生沒有白走的路，每一步都算數。", author: "三毛", type: "pos" },
  { text: "有時候，什麼都不做，只是好好呼吸，也是一種成就。", author: "佚名", type: "neg" },
  { text: "並不是所有的努力都會有結果，但不努力一定不會有結果。", author: "佚名", type: "neg" },
  { text: "人生最大的悲劇，不是失敗，而是從未嘗試。", author: "佚名", type: "neg" },
  { text: "有些門，關上就不會再開；有些人，走了就不再回來。", author: "佚名", type: "neg" },
  { text: "我們花了太多時間，去在意那些根本不在意我們的人。", author: "佚名", type: "neg" },
  { text: "焦慮的本質，是把所有的未來都想成了最壞的結局。", author: "佚名", type: "neg" },
  { text: "每個人都在假裝自己還好，但其實沒有一個人真的還好。", author: "佚名", type: "neg" },
];

// ── Storage ───────────────────────────────────────────
function loadCustom() {
  try { return JSON.parse(localStorage.getItem('dq_custom') || '[]'); } catch { return []; }
}
function saveCustom(arr) {
  localStorage.setItem('dq_custom', JSON.stringify(arr));
}

// ── Today's quote (fixed per day) ─────────────────────
function getTodayQuote() {
  const all = [...BUILT_IN, ...loadCustom()];
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  const idx = seed % all.length;
  return all[idx];
}

function renderToday() {
  const q = getTodayQuote();
  document.getElementById('todayText').textContent = q.text;
  const authorEl = document.getElementById('todayAuthor');
  authorEl.textContent = q.author || '';
  authorEl.style.display = q.author ? '' : 'none';
  const tag = document.getElementById('todayTag');
  tag.textContent = q.type === 'pos' ? '☀ 正能量' : '🌑 負能量';
  tag.className = 'card-tag ' + q.type;
}

// ── Date label ────────────────────────────────────────
function renderDate() {
  const d = new Date();
  const weekDays = ['日','一','二','三','四','五','六'];
  const str = `${d.getFullYear()} · ${String(d.getMonth()+1).padStart(2,'0')} / ${String(d.getDate()).padStart(2,'0')}  週${weekDays[d.getDay()]}`;
  document.getElementById('dateLabel').textContent = str;
}

// ── Draw random ───────────────────────────────────────
let lastDrawIdx = -1;
function drawRandom() {
  const all = [...BUILT_IN, ...loadCustom()];
  if (all.length <= 1) return;
  let idx;
  do { idx = Math.floor(Math.random() * all.length); } while (idx === lastDrawIdx);
  lastDrawIdx = idx;
  const q = all[idx];
  const card = document.getElementById('drawCard');
  card.className = 'draw-card flip-anim';
  card.innerHTML = `
    <div class="card-tag ${q.type}">${q.type === 'pos' ? '☀ 正能量' : '🌑 負能量'}</div>
    <div class="draw-quote-text">${q.text}</div>
    ${q.author ? `<div class="draw-quote-author">${q.author}</div>` : ''}
  `;
  setTimeout(() => card.classList.remove('flip-anim'), 400);
}

// ── Add form toggle ───────────────────────────────────
let formOpen = false;
function toggleAddForm() {
  formOpen = !formOpen;
  const wrap = document.getElementById('addFormWrap');
  if (formOpen) {
    wrap.classList.remove('closed');
    wrap.style.maxHeight = '500px';
    setTimeout(() => document.getElementById('inputText').focus(), 50);
  } else {
    wrap.style.maxHeight = '0';
    setTimeout(() => wrap.classList.add('closed'), 350);
  }
}

// ── Add quote ─────────────────────────────────────────
function addQuote() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('請輸入語錄內容'); return; }
  const author = document.getElementById('inputAuthor').value.trim();
  const type = document.getElementById('inputType').value;
  const arr = loadCustom();
  arr.unshift({ text, author, type, id: Date.now() });
  saveCustom(arr);
  document.getElementById('inputText').value = '';
  document.getElementById('inputAuthor').value = '';
  renderList();
  toggleAddForm();
}

// ── List ──────────────────────────────────────────────
let listOpen = true;
function toggleList() {
  listOpen = !listOpen;
  const wrap = document.getElementById('listWrap');
  const icon = document.getElementById('toggleIcon');
  if (listOpen) {
    wrap.classList.remove('closed');
    wrap.style.maxHeight = '2000px';
    icon.classList.remove('open');
  } else {
    wrap.style.maxHeight = '0';
    wrap.classList.add('closed');
    icon.classList.add('open');
  }
}

function deleteQuote(id) {
  const arr = loadCustom().filter(q => q.id !== id);
  saveCustom(arr);
  renderList();
}

function renderList() {
  const arr = loadCustom();
  const list = document.getElementById('quoteList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('customCount');
  count.textContent = arr.length ? `(${arr.length})` : '';
  if (!arr.length) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = arr.map(q => `
    <div class="quote-item">
      <div class="quote-item-body">
        <div class="card-tag ${q.type}" style="font-size:10px;padding:3px 8px;margin-bottom:8px">${q.type === 'pos' ? '☀ 正能量' : '🌑 負能量'}</div>
        <div class="quote-item-text">${esc(q.text)}</div>
        ${q.author ? `<div class="quote-item-author">${esc(q.author)}</div>` : ''}
      </div>
      <button class="delete-btn" onclick="deleteQuote(${q.id})" title="刪除">✕</button>
    </div>
  `).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────
renderDate();
renderToday();
renderList();
</script>
</body>
</html>
